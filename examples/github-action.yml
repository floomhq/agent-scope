name: Agent Scope

on:
  pull_request:

jobs:
  scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install agent-scope
        run: npm install -g @floomhq/agent-scope

      - name: Check scope
        run: agent-scope check --base origin/${{ github.base_ref }}
